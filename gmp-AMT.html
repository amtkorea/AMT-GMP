<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMT GMP 품질관리 시스템</title>
<style>
  :root{
    --green:#15a36a; --green-d:#0f7f52; --green-l:#e8f6ef;
    --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --bg:#f6f8f7; --card:#ffffff;
    --red:#dc2626; --amber:#d97706; --blue:#2563eb;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic","맑은 고딕",sans-serif;color:var(--ink);background:var(--bg);font-size:14px}
  button{font-family:inherit;cursor:pointer}
  .hidden{display:none!important}

  #loginView{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:34px 30px;width:100%;max-width:380px;box-shadow:0 8px 30px rgba(0,0,0,.06)}
  .login-card h1{font-size:18px;margin:0 0 4px;color:var(--green-d)}
  .login-card .sub{color:var(--muted);font-size:12px;margin-bottom:22px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:14px}
  .field input:focus{outline:2px solid var(--green-l);border-color:var(--green)}
  .btn{background:var(--green);color:#fff;border:none;padding:11px 16px;border-radius:9px;font-size:14px;font-weight:600}
  .btn:hover{background:var(--green-d)}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .btn-full{width:100%}
  .btn-ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{background:#f3f4f6}
  .btn-danger{background:var(--red)}
  .btn-danger:hover{background:#b91c1c}
  .btn-blue{background:var(--blue)}
  .btn-sm{padding:6px 11px;font-size:12px;border-radius:7px}
  .err{color:var(--red);font-size:12px;margin-top:10px;min-height:16px}

  #mainView{display:flex;min-height:100vh}
  .side{width:230px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
  .brand{padding:18px 18px 14px;border-bottom:1px solid var(--line)}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:var(--green);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;vertical-align:middle}
  .brand .name{font-weight:700;margin-left:9px;vertical-align:middle}
  .brand .name small{display:block;font-weight:400;color:var(--muted);font-size:11px;margin-left:0}
  .menu{padding:10px 8px;flex:1;overflow-y:auto}
  .menu-link{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;color:var(--ink);text-decoration:none;font-size:13px;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
  .menu-link:hover{background:#f3f4f6}
  .menu-link.active{background:var(--green-l);color:var(--green-d);font-weight:600}
  .menu-link .dot{width:7px;height:7px;border-radius:50%;background:#cbd5e1}
  .menu-link.active .dot{background:var(--green)}
  .side-foot{padding:14px 16px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
  .side-foot .u{color:var(--ink);font-weight:600}
  .badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;background:var(--green-l);color:var(--green-d);font-weight:600;margin-left:6px}
  .badge.gray{background:#eef2f4;color:var(--muted)}

  .content{flex:1;min-width:0}
  .topbar{height:56px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px}
  .topbar h2{font-size:16px;margin:0}
  .topbar .right{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px}
  .page{padding:22px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:18px}
  .card .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .card .card-h .t{font-weight:700;font-size:14px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:11px 10px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:600;font-size:12px}
  tr:last-child td{border-bottom:none}
  .pill{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
  .pill.green{background:var(--green-l);color:var(--green-d)}
  .pill.amber{background:#fef3c7;color:var(--amber)}
  .pill.blue{background:#e0edff;color:var(--blue)}
  .empty{color:var(--muted);text-align:center;padding:30px 10px}
  .actions-cell{display:flex;gap:6px;justify-content:flex-end}

  .banner{border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:10px}
  .banner.ok{background:var(--green-l);color:var(--green-d)}
  .banner.warn{background:#fef3c7;color:var(--amber)}
  .banner.bad{background:#fee2e2;color:var(--red)}
  .banner b{font-weight:700}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:22px}
  .modal h3{margin:0 0 16px;font-size:16px}
  .modal .field input,.modal .field select{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:9px;font-size:14px}
  .modal .row2{display:flex;gap:12px}
  .modal .row2 .field{flex:1}
  .modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
  .chk{display:flex;align-items:center;gap:8px}
  .chk input{width:auto}
  .ro{background:#f3f4f6;color:var(--muted)}

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .25s;z-index:90;pointer-events:none}
  #toast.show{opacity:1}

  @media(max-width:760px){
    .side{position:fixed;z-index:40;height:100%;transform:translateX(-100%);transition:transform .2s;box-shadow:4px 0 20px rgba(0,0,0,.1)}
    .side.open{transform:translateX(0)}
    .menu-toggle{display:inline-flex!important}
  }
  .menu-toggle{display:none;background:none;border:1px solid var(--line);border-radius:8px;padding:6px 10px;margin-right:10px}
</style>
</head>
<body>

<div id="loginView">
  <div class="login-card">
    <h1>AMT GMP 품질관리 시스템</h1>
    <div class="sub">이메일과 코드로 로그인하세요.</div>
    <div class="field"><label>이메일</label><input id="loginEmail" type="email" autocomplete="username" placeholder="name@gmail.com"></div>
    <div class="field"><label>코드</label><input id="loginCode" type="password" autocomplete="current-password" placeholder="코드 입력"></div>
    <button id="loginBtn" class="btn btn-full">로그인</button>
    <div id="loginErr" class="err"></div>
  </div>
</div>

<div id="mainView" class="hidden">
  <aside class="side" id="side">
    <div class="brand"><span class="logo">GMP</span><span class="name">AMT GMP<small>품질관리 시스템</small></span></div>
    <nav class="menu" id="menu"></nav>
    <div class="side-foot">
      <div class="u" id="sideUser">-</div>
      <div id="sideRole" style="margin:2px 0 10px"></div>
      <button id="logoutBtn" class="btn btn-ghost btn-sm btn-full">로그아웃</button>
    </div>
  </aside>
  <div class="content">
    <div class="topbar">
      <div style="display:flex;align-items:center"><button class="menu-toggle" id="menuToggle">☰</button><h2 id="pageTitle">대시보드</h2></div>
      <div class="right"><span class="pill green">GMP 전자기록</span><span id="topUser"></span></div>
    </div>
    <div class="page" id="page"></div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
import { getDatabase, ref, get, set, update, push, onValue, off }
  from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

/* ── GMP DB (amt-gmp / amtkorea) ── */
const firebaseConfig = {
  apiKey: "AIzaSyBy3A5kZU-XdzBUIpdLNTrFJnrlWcYEtt8",
  authDomain: "amt-gmp.firebaseapp.com",
  databaseURL: "https://amt-gmp-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "amt-gmp",
  storageBucket: "amt-gmp.firebasestorage.app",
  messagingSenderId: "561161839771",
  appId: "1:561161839771:web:dfb913975e882d12ba523e"
};
const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

/* ── 운영앱 DB (amt-ky / amedtech) : 읽기 전용 ── */
const amtKyConfig = {
  apiKey: "AIzaSyC2jfTHmaguOS9e_ddTvicUZJcvXzQ7EKI",
  authDomain: "amt-ky.firebaseapp.com",
  databaseURL: "https://amt-ky-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "amt-ky",
  storageBucket: "amt-ky.firebasestorage.app",
  messagingSenderId: "1082363760608",
  appId: "1:1082363760608:web:ac27fa51dc23cb603ee585"
};
const appAmt  = initializeApp(amtKyConfig, 'amt');
const authAmt = getAuth(appAmt);
const dbAmt   = getDatabase(appAmt);
function amtKyPw(email){ return 'amtky2026_' + String(email||'').toLowerCase().replace(/[^a-z0-9]/g,'_') + '_x'; }

const SUPER_EMAIL = "kyunghoyou@gmail.com";

/* ── 공통 헬퍼 ── */
function escHtml(s){
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function emailKey(email){ return String(email||'').trim().toLowerCase().replace(/\./g,','); }
function $(id){ return document.getElementById(id); }
function fmt(n){ return Number(n||0).toLocaleString('ko-KR'); }
function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(window.__tt); window.__tt=setTimeout(()=>t.classList.remove('show'),2400); }
// 제조일 + 개월 - 1일 (라벨 "제조일로부터 N년까지" 규칙)
function addMonthsMinus1(dateStr, months){
  if(!dateStr) return '';
  const d=new Date(dateStr+'T00:00:00'); if(isNaN(d.getTime())) return '';
  d.setMonth(d.getMonth()+months); d.setDate(d.getDate()-1);
  return d.toISOString().slice(0,10);
}

let currentUser = null;
let loggingIn   = false;
let productsUnsub = null;   // 화면 전환 시 해제되는 리스너 슬롯
let usersUnsub = null;

/* ── 운영앱 제품명 → GMP 제품명 (MEDIAS 분할) ── */
function gmpProductsFor(opProduct){
  const p = String(opProduct||'').trim().toUpperCase();
  if(p==='MEDIAS') return ['MEDIAS T','MEDIAS'];
  if(p==='JUC')    return ['JUC Spray Dressing'];
  if(p==='DELL')   return ['DELL'];
  return [opProduct];
}

/* ── 감사기록 ── */
async function logAudit(action, detail){
  try{ await push(ref(db,'gmp_audit'),{ ts:Date.now(), user: currentUser?(currentUser.name+' <'+currentUser.email+'>'):'unknown', action, detail:detail||'' }); }catch(_){}
}

/* ── 로그인 ── */
async function ensureAuth(email){
  const pw = 'gmp!' + email;
  try{ await signInWithEmailAndPassword(auth, email, pw); }
  catch(e){ await createUserWithEmailAndPassword(auth, email, pw); }
}
async function doLogin(){
  const email = ($('loginEmail').value||'').trim().toLowerCase();
  const code  = ($('loginCode').value||'').trim();
  const errEl = $('loginErr'); errEl.textContent='';
  if(!email || !code){ errEl.textContent='이메일과 코드를 모두 입력하세요.'; return; }
  const btn=$('loginBtn'); btn.disabled=true; btn.textContent='확인 중...'; loggingIn=true;
  try{
    await ensureAuth(email);
    const key = emailKey(email);
    let rec = (await get(ref(db,'gmp_admins/'+key))).val();
    if(!rec){
      if(email === SUPER_EMAIL){ rec={ email, name:'유경호', code, role:'super', createdAt:Date.now() }; await set(ref(db,'gmp_admins/'+key), rec); }
      else{ await signOut(auth); throw new Error('등록되지 않은 사용자입니다. 총괄관리자에게 등록을 요청하세요.'); }
    }
    if(String(rec.code) !== String(code)){ await signOut(auth); throw new Error('코드가 일치하지 않습니다.'); }
    currentUser = { email, name: rec.name||email, role: rec.role||'viewer' };
    await cleanupPlaceholder();
    logAudit('로그인','사용자 '+currentUser.name+' 로그인');
    renderMain();
  }catch(e){ errEl.textContent = e.message || '로그인에 실패했습니다.'; }
  finally{ loggingIn=false; btn.disabled=false; btn.textContent='로그인'; }
}
async function cleanupPlaceholder(){
  if(currentUser && currentUser.role==='super'){ try{ await set(ref(db,'viewer_emails/placeholder@example,com'), null); }catch(_){} }
}
async function doLogout(){
  logAudit('로그아웃','사용자 '+(currentUser?currentUser.name:'')+' 로그아웃');
  if(productsUnsub){ productsUnsub(); productsUnsub=null; }
  if(usersUnsub){ usersUnsub(); usersUnsub=null; }
  currentUser=null;
  try{ await signOut(authAmt); }catch(_){}
  await signOut(auth);
  showLogin();
}
function showLogin(){ $('mainView').classList.add('hidden'); $('loginView').classList.remove('hidden'); $('loginCode').value=''; }

const MENUS = [
  {id:'dash',   label:'대시보드',        ready:true},
  {id:'prod',   label:'제품관리',        ready:true},
  {id:'lot',    label:'LOT 관리 · 입고',  ready:true},
  {id:'ledger', label:'입출고관리대장',  ready:true},
  {id:'insIn',  label:'입고검사성적서',  ready:true},
  {id:'insOut', label:'출고검사성적서',  ready:true},
  {id:'files',  label:'첨부파일관리',    ready:true},
  {id:'trace',  label:'LOT 추적조회',    ready:true},
  {id:'audit',  label:'Audit Trail',     ready:true},
  {id:'settings',label:'설정(사용자관리)',ready:true, superOnly:true}
];

function renderMain(){
  $('loginView').classList.add('hidden'); $('mainView').classList.remove('hidden');
  const roleLabel = {super:'총괄관리자', admin:'관리자', viewer:'조회자'}[currentUser.role]||currentUser.role;
  $('sideUser').textContent = currentUser.name;
  $('sideRole').innerHTML = '<span class="badge '+(currentUser.role==='viewer'?'gray':'')+'">'+escHtml(roleLabel)+'</span>';
  $('topUser').textContent = currentUser.name+' ('+roleLabel+')';
  const menu=$('menu'); menu.innerHTML='';
  MENUS.forEach(m=>{
    if(m.superOnly && currentUser.role!=='super') return;
    const a=document.createElement('button'); a.className='menu-link'; a.dataset.id=m.id;
    a.innerHTML='<span class="dot"></span><span>'+escHtml(m.label)+'</span>'+(m.ready?'':'<span class="badge gray" style="margin-left:auto">준비중</span>');
    a.addEventListener('click',()=>{ navTo(m.id); if(window.innerWidth<=760) $('side').classList.remove('open'); });
    menu.appendChild(a);
  });
  navTo('dash');
}
function navTo(id){
  document.querySelectorAll('.menu-link').forEach(el=>el.classList.toggle('active', el.dataset.id===id));
  const m = MENUS.find(x=>x.id===id);
  $('pageTitle').textContent = m? m.label : '';
  if(productsUnsub){ productsUnsub(); productsUnsub=null; }
  if(usersUnsub){ usersUnsub(); usersUnsub=null; }
  if(id==='prod')          renderProducts();
  else if(id==='dash')     renderDash();
  else if(id==='lot')      renderLot();
  else if(id==='ledger')   renderLedger();
  else if(id==='insIn')    renderInsInList();
  else if(id==='insOut')   renderInsOutList();
  else if(id==='files')    renderFiles();
  else if(id==='trace')    renderTrace();
  else if(id==='audit')    renderAudit();
  else if(id==='settings') renderSettings();
  else renderPlaceholder(m?m.label:'');
}
function renderPlaceholder(label){ $('page').innerHTML='<div class="card"><div class="empty">'+escHtml(label)+' 메뉴는 다음 단계에서 추가됩니다.</div></div>'; }

/* ── 제품관리 ── */
const canWrite = ()=> currentUser && (currentUser.role==='super'||currentUser.role==='admin');
function renderProducts(){
  const writeBtns = canWrite() ? '<div style="display:flex;gap:8px"><button id="seedBtn" class="btn btn-ghost btn-sm">기본 4제품 등록</button><button id="addProdBtn" class="btn btn-sm">+ 제품 추가</button></div>' : '';
  $('page').innerHTML='<div class="card"><div class="card-h"><div class="t">제품 목록</div>'+writeBtns+'</div><div id="prodTable"><div class="empty">불러오는 중...</div></div></div>';
  if(canWrite()){ $('addProdBtn').addEventListener('click',()=>openProdModal(null)); $('seedBtn').addEventListener('click',seedProducts); }
  const r = ref(db,'gmp_data/products');
  const cb = onValue(r,(snap)=>{
    const val = snap.val()||{};
    const rows = Object.keys(val).map(k=>Object.assign({_id:k}, val[k]));
    rows.sort((a,b)=>String(a.name).localeCompare(String(b.name),'ko'));
    drawProdTable(rows);
  },(err)=>{ $('prodTable').innerHTML='<div class="empty">읽기 오류: '+escHtml(err.message)+'</div>'; });
  productsUnsub = ()=>off(r,'value',cb);
}
function drawProdTable(rows){
  if(!rows.length){ $('prodTable').innerHTML='<div class="empty">등록된 제품이 없습니다.'+(canWrite()?' 위의 “기본 4제품 등록”으로 시작하세요.':'')+'</div>'; return; }
  let html='<table><thead><tr><th>제품명</th><th>모델명</th><th>제조사</th><th>멸균</th><th>유효기간</th><th>GTIN</th>'+(canWrite()?'<th></th>':'')+'</tr></thead><tbody>';
  rows.forEach(p=>{
    const ster = p.sterile? '<span class="pill amber">멸균</span>' : '<span class="pill green">비멸균</span>';
    const gtins = (p.gtins&&p.gtins.length)? escHtml(p.gtins.join(', ')) : '<span style="color:var(--muted)">-</span>';
    html+='<tr><td><b>'+escHtml(p.name)+'</b></td><td>'+escHtml(p.model)+'</td><td>'+escHtml(p.maker)+'</td><td>'+ster+'</td><td>'+escHtml((p.shelfMonths||36))+'개월</td><td>'+gtins+'</td>';
    if(canWrite()) html+='<td><div class="actions-cell"><button class="btn btn-ghost btn-sm" data-edit="'+escHtml(p._id)+'">수정</button><button class="btn btn-danger btn-sm" data-del="'+escHtml(p._id)+'">삭제</button></div></td>';
    html+='</tr>';
  });
  html+='</tbody></table>';
  const wrap=$('prodTable'); wrap.innerHTML=html;
  if(canWrite()){
    wrap.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>openProdModal(rows.find(x=>x._id===b.getAttribute('data-edit')))));
    wrap.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>delProduct(rows.find(x=>x._id===b.getAttribute('data-del')))));
  }
}
function openProdModal(row){
  const isEdit=!!row;
  const m=document.createElement('div'); m.className='modal-bg';
  m.innerHTML='<div class="modal"><h3>'+(isEdit?'제품 수정':'제품 추가')+'</h3>'+
    '<div class="field"><label>제품명 (GMP 실제명)</label><input id="f_name" value="'+escHtml(isEdit?row.name:'')+'"></div>'+
    '<div class="row2"><div class="field"><label>모델명</label><input id="f_model" value="'+escHtml(isEdit?row.model:'')+'"></div><div class="field"><label>유효기간(개월)</label><input id="f_shelf" type="number" value="'+escHtml(isEdit?(row.shelfMonths||36):36)+'"></div></div>'+
    '<div class="field"><label>제조사</label><input id="f_maker" value="'+escHtml(isEdit?row.maker:'')+'"></div>'+
    '<div class="field"><label>수입업체</label><input id="f_importer" value="'+escHtml(isEdit?(row.importer||'AMT Korea'):'AMT Korea')+'"></div>'+
    '<div class="field"><label>GTIN (여러 개면 쉼표로 구분, 앞의 0 포함)</label><input id="f_gtins" value="'+escHtml(isEdit&&row.gtins?row.gtins.join(', '):'')+'" placeholder="예: 06922278500034"></div>'+

async function connectAmtKy(){
  if(!currentUser){ amtKy={status:'noauth',invLogs:[],internalTrades:[],err:''}; return; }
  try{
    await signInWithEmailAndPassword(authAmt, currentUser.email, amtKyPw(currentUser.email));
    const data = (await get(ref(dbAmt,'amt_data'))).val()||{};
    const tomb = data.tombstones||{}; const tombInv=tomb.invLogs||{}; const tombInt=tomb.internalTrades||{};
    let inv = data.invLogs||[];        if(!Array.isArray(inv)) inv = Object.values(inv);
    let it  = data.internalTrades||[]; if(!Array.isArray(it))  it  = Object.values(it);
    inv = inv.filter(x=> x && !tombInv[x.id]);   // 운영앱에서 삭제(tombstone)된 수입 제외
    it  = it.filter(x=> x && !tombInt[x.id]);    // 삭제된 내부거래 제외
    amtKy = { status:'ok', invLogs:inv, internalTrades:it, err:'' };
  }catch(e){
    const code=e.code||'';
    if(code.includes('invalid-credential')||code.includes('wrong-password')||code.includes('user-not-found'))
      amtKy = { status:'noaccess', invLogs:[], internalTrades:[], err:'운영앱 계정 권한 없음' };
    else amtKy = { status:'error', invLogs:[], internalTrades:[], err:(e.message||String(e)) };
  }
}

/* ── GS1 DataMatrix 파서 (괄호형식 + FNC1 raw 둘 다 지원) ── */
function parseGs1(raw){
  const original=String(raw||'');
  let s=original;
  const out={};
  if(/\(\d{2,4}\)/.test(s)){
    // 괄호 형식 (01)...(10)...
    const re=/\((\d{2,4})\)([^(]*)/g; let m;
    while((m=re.exec(s))){ out[m[1]]=(m[2]||'').replace(/[\x1d\u001d]/g,'').trim(); }
  }else{
    // 비괄호: 선행 심볼로지ID(]d2 등)와 선행 FNC1(\x1d) 제거
    s=s.replace(/^[\x1d\u001d]+/,'').replace(/^\][A-Za-z]\d?/,'').replace(/^[\x1d\u001d]+/,'');
    const isGS=(c)=> c==='\x1d' || c==='\u001d';
    const fixed={'00':18,'01':14,'02':14,'11':6,'12':6,'13':6,'15':6,'16':6,'17':6,'20':2};
    let i=0, guard=0;
    while(i<s.length && guard++<60){
      while(i<s.length && isGS(s[i])) i++;        // 사이사이 구분문자 건너뜀
      if(i>=s.length) break;
      const ai=s.substr(i,2);
      if(!/^\d{2}$/.test(ai)) break;              // AI는 숫자 2자리여야 함
      i+=2;
      if(fixed[ai]!=null){ out[ai]=s.substr(i,fixed[ai]); i+=fixed[ai]; }
      else{ let j=i; while(j<s.length && !isGS(s[j])) j++; out[ai]=s.substring(i,j); i=j; }
    }
  }
  const ymd=(v)=>{ v=String(v||'').replace(/\D/g,''); if(v.length<6) return ''; const y='20'+v.substr(0,2), mm=v.substr(2,2); let dd=v.substr(4,2); if(dd==='00') dd='01'; return y+'-'+mm+'-'+dd; };
  return {
    gtin:(out['01']||'').replace(/\D/g,''),
    lot:(out['10']||'').trim(),
    prodDate:ymd(out['11']),
    expDate:ymd(out['17']),
    serial:(out['21']||'').trim(),
    _raw: original.replace(/[\x1d\u001d]/g,'⟨GS⟩')   // 진단용(구분문자 보이게)
  };
}

/* ── 카메라 스캔 (BarcodeDetector, Pixel9 Chrome 지원) ── */
async function openScanner(onResult){
  let detector;
  try{
    if(!('BarcodeDetector' in window)) throw new Error('이 브라우저는 자동 스캔 미지원');
    const fmts = await window.BarcodeDetector.getSupportedFormats();
    if(!fmts.includes('data_matrix')) throw new Error('이 기기는 DataMatrix 스캔 미지원');
    detector = new window.BarcodeDetector({formats:['data_matrix']});
  }catch(e){ toast('자동 스캔 불가 — 수동 입력하세요 ('+e.message+')'); return; }

  const m=document.createElement('div'); m.className='modal-bg';
  m.innerHTML='<div class="modal" style="max-width:420px"><h3>GS1 매트릭스 스캔</h3>'+
    '<video id="scanVid" autoplay playsinline muted style="width:100%;border-radius:10px;background:#000;aspect-ratio:4/3;object-fit:cover"></video>'+
    '<div style="color:var(--muted);font-size:12px;margin-top:8px">박스의 GS1 DataMatrix를 화면에 비추세요. 자동으로 인식됩니다.</div>'+
    '<div class="modal-foot"><button class="btn btn-ghost" id="scanCancel">취소</button></div></div>';
  document.body.appendChild(m);
  const vid=m.querySelector('#scanVid');
  let stream=null, raf=0, stopped=false;
  function stop(){ stopped=true; if(raf) cancelAnimationFrame(raf); if(stream) stream.getTracks().forEach(t=>t.stop()); m.remove(); }
  m.querySelector('#scanCancel').addEventListener('click', stop);
  try{
    stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:{ideal:'environment'} } });
    vid.srcObject=stream; await vid.play();
  }catch(e){ toast('카메라 접근 실패: '+(e.message||e)); stop(); return; }
  async function tick(){
    if(stopped) return;
    try{
      const codes = await detector.detect(vid);
      if(codes && codes.length){ const raw=codes[0].rawValue; stop(); onResult(parseGs1(raw)); return; }
    }catch(_){}
    raf=requestAnimationFrame(tick);
  }
  raf=requestAnimationFrame(tick);
}

      if(g.expDate) m.querySelector('#l_exp').value=g.expDate;
      else if(g.prodDate) m.querySelector('#l_exp').value=addMonthsMinus1(g.prodDate, shelf);
      if(g.gtin) m.querySelector('#l_gtin').value=g.gtin;
      const warn=m.querySelector('#l_warn');
      let msg='';
      const known=(prod.gtins||[]).map(x=>String(x).replace(/^0+/,''));
      const scanned=String(g.gtin||'').replace(/^0+/,'');
      if(g.gtin && known.length && known.indexOf(scanned)<0) msg+='⚠️ 스캔한 GTIN이 이 제품 등록값과 다릅니다. 박스를 확인하세요. ';
      if(!g.lot){ msg+='LOT가 자동인식 안 됐어요 — 박스 보고 직접 입력하세요. '; m.querySelector('#l_lot').focus(); }
      warn.innerHTML = escHtml(msg) + '<div style="color:var(--muted);font-size:10px;margin-top:4px;word-break:break-all">스캔 원문: '+escHtml(g._raw||'(없음)')+'</div>';
      toast(g.lot ? '스캔 완료 — 값이 채워졌습니다' : '스캔됨 — LOT는 직접 입력하세요');
    });
  });

  m.querySelector('#l_save').addEventListener('click',async()=>{
    const lotNo=(m.querySelector('#l_lot').value||'').trim();
    const prodDate=m.querySelector('#l_pdate').value||'';
    let expiry=m.querySelector('#l_exp').value||'';
    const qty=parseInt(m.querySelector('#l_qty').value||'0',10)||0;
    if(!lotNo){ toast('LOT 번호를 입력하세요'); return; }
    if(!prodDate){ toast('제조일자를 입력하세요'); return; }
    if(qty<=0){ toast('입고수량을 입력하세요'); return; }
    if(!expiry) expiry=addMonthsMinus1(prodDate, shelf);
    const lot={
      product:p.gmpProduct, productId:prod._id||'', model:prod.model||'',
      gtin:(m.querySelector('#l_gtin').value||'').trim(),
      lotNo, prodDate, expiry,
      customsNo:(m.querySelector('#l_customs').value||'').trim(),
      importDeclNo:(m.querySelector('#l_decl').value||'').trim(),
      initialQty:qty, currentQty:qty,
      srcInvId:p.srcInvId, opProduct:p.opProduct, inDate:p.date||'',
      sterile:!!prod.sterile,
      inspectInStatus:'pending',
      createdAt:Date.now(), createdBy:currentUser.name
    };
    try{
      await push(ref(db,'gmp_data/lots'), lot);
      logAudit('등록','LOT 등록: '+p.gmpProduct+' / '+lotNo+' '+fmt(qty)+'개');
      toast('LOT가 등록되었습니다'); m.remove();
    }catch(e){ toast('저장 실패: '+e.message); }
  });
}

let ledgerLots=[], ledgerOut=[], ignoredTrades=new Set();
function snapArr(snap){ const v=snap.val()||{}; return Object.keys(v).map(k=>Object.assign({_id:k},v[k])); }
function igKey(id, product){ return String(id+'_'+product).replace(/[^a-zA-Z0-9]/g,'_'); }
async function ignoreTrade(r){

}

/* ════════ 입출고관리대장 (AMT-OP-601) — 합격 건 running 재고 ════════ */
function ledgerRows(){
  const out=[];
  const lots = ledgerLots.slice().sort((a,b)=> String(a.inDate||a.prodDate||'').localeCompare(String(b.inDate||b.prodDate||'')) || Number(a.createdAt||0)-Number(b.createdAt||0));
  lots.forEach(l=>{
    if(!(l.inspectInStatus==='done' && l.inspectInOverall==='pass')) return; // 입고검사 합격 LOT만
    let bal=Number(l.initialQty)||0;
    out.push({ kind:'in', model:l.model||l.product, lot:l.lotNo, inDate:l.inDate||l.prodDate||'', inQty:Number(l.initialQty)||0, bal });
    const outs = ledgerOut.filter(o=> o.lotId===l._id && o.inspectOutStatus==='done' && o.inspectOutOverall==='pass')
      .sort((a,b)=> String(a.date||'').localeCompare(String(b.date||'')) || Number(a.createdAt||0)-Number(b.createdAt||0));
    outs.forEach(o=>{ bal -= Number(o.qty)||0; out.push({ kind:'out', model:o.model||l.model||o.product, lot:l.lotNo, outDate:o.date, outQty:Number(o.qty)||0, dest:o.dest||'KY 메디칼', bal }); });
  });
  return out;
}
function ledgerFiltered(){
  let rows=ledgerRows();
  const fModel=($('lg_model')&&$('lg_model').value||'').trim();
  const fLot=($('lg_lot')&&$('lg_lot').value||'').trim().toLowerCase();
  const fFrom=($('lg_from')&&$('lg_from').value)||'';
  const fTo=($('lg_to')&&$('lg_to').value)||'';
  if(fModel) rows=rows.filter(r=>String(r.model)===fModel);
  if(fLot) rows=rows.filter(r=>String(r.lot||'').toLowerCase().includes(fLot));
  if(fFrom||fTo){ rows=rows.filter(r=>{ const d=r.kind==='in'?r.inDate:r.outDate; if(!d) return false; if(fFrom&&d<fFrom) return false; if(fTo&&d>fTo) return false; return true; }); }
  return rows;
}
function drawLedgerTable(){
  const el=$('ledgerTable'); if(!el) return;

  if(!rows.length){ el.innerHTML='<div class="empty">검사 합격된 입출고 건이 없습니다. (입고검사·출고검사 합격 시 표시)</div>'; return; }

    html+='<tr style="background:'+bg+'">'+

      '<td style="text-align:right">'+(isIn?'':fmt(r.outQty))+'</td>'+

  html+='</tbody></table>';
  el.innerHTML=html;

function drawOutPending(){
  const el=$('outPending'); if(!el) return;
  if(amtKy.status!=='ok'){ el.innerHTML='<div class="empty">운영앱 연결 시 내부거래가 표시됩니다.</div>'; return; }
  const done=new Set(ledgerOut.map(o=>String(o.srcTradeId)+'|'+o.product));
  const trades=amtKy.internalTrades.slice().sort((a,b)=>String(b.date||'').localeCompare(String(a.date||'')));
  const rows=[];
  trades.forEach(t=>{ if(Number(t.qty)<=0) return; gmpProductsFor(t.product).forEach(gp=>{ if(done.has(String(t.id)+'|'+gp)) return; if(ignoredTrades.has(igKey(t.id,gp))) return; rows.push({srcTradeId:t.id, opProduct:t.product, product:gp, qty:t.qty, date:t.date, memo:t.memo||''}); }); });
  if(!rows.length){ el.innerHTML='<div class="empty">대기 중인 출고 건이 없습니다. (모두 처리됨)</div>'; return; }
  let html='<table><thead><tr><th>거래일</th><th>운영앱 제품</th><th>→ GMP 제품</th><th>수량(봉투)</th><th>출고처</th><th>메모</th><th></th></tr></thead><tbody>';
  rows.forEach((r,idx)=>{ html+='<tr><td>'+escHtml(r.date)+'</td><td>'+escHtml(r.opProduct)+'</td><td><b>'+escHtml(r.product)+'</b></td><td>'+fmt(r.qty)+'</td><td>KY 메디칼</td><td>'+escHtml(r.memo)+'</td><td><div class="actions-cell">'+(canWrite()?'<button class="btn btn-sm" data-out="'+idx+'">출고 처리</button><button class="btn btn-ghost btn-sm" data-ig="'+idx+'">무시</button>':'<span class="pill amber">대기</span>')+'</div></td></tr>'; });
  html+='</tbody></table>';
  el.innerHTML=html;
  if(canWrite()){
    el.querySelectorAll('[data-out]').forEach(b=>b.addEventListener('click',()=>openOutModal(rows[parseInt(b.getAttribute('data-out'),10)])));
    el.querySelectorAll('[data-ig]').forEach(b=>b.addEventListener('click',()=>ignoreTrade(rows[parseInt(b.getAttribute('data-ig'),10)])));
  }
}

// 유통기한 임박순(선입선출) 자동 배정
function allocateFifo(product, qty){
  const avail = ledgerLots.filter(l=>l.product===product && Number(l.currentQty)>0)
    .sort((a,b)=>String(a.expiry||'').localeCompare(String(b.expiry||'')));
  let remain=Number(qty)||0; const take={};
  avail.forEach(l=>{ const t=Math.max(0,Math.min(remain,Number(l.currentQty))); if(t>0){ take[l._id]=t; remain-=t; } });
  return { avail, take, remain };
}

function openOutModal(p){
  const need=Number(p.qty)||0;
  const a=allocateFifo(p.product, need);
  const avail=a.avail, take=a.take;
  const m=document.createElement('div'); m.className='modal-bg';
  let lotRows='';
  if(!avail.length) lotRows='<div class="empty" style="color:var(--red)">출고 가능한 재고(LOT)가 없습니다. 먼저 LOT 등록을 하세요.</div>';
  else avail.forEach(l=>{
    const ins = l.inspectInStatus==='done' ? (l.inspectInOverall==='fail'?'<span class="pill" style="background:#fee2e2;color:#dc2626">입고검사 불합격</span>':'<span class="pill green">입고검사 합격</span>') : '<span class="pill amber">미검사</span>';
    lotRows += '<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)">'+
      '<div style="flex:1"><b>'+escHtml(l.lotNo)+'</b> '+ins+'<div style="color:var(--muted);font-size:11px">유통기한 '+escHtml(l.expiry)+' · 현재재고 '+fmt(l.currentQty)+'</div></div>'+
      '<input type="number" data-lot="'+escHtml(l._id)+'" value="'+(take[l._id]||0)+'" min="0" max="'+Number(l.currentQty)+'" style="width:120px;padding:8px;border:1px solid var(--line);border-radius:7px">'+
      '</div>';
  });
  m.innerHTML='<div class="modal"><h3>출고 처리 — '+escHtml(p.product)+'</h3>'+
    '<div style="font-size:13px;margin-bottom:6px">출고처 <b>KY 메디칼</b> · 출고수량 <b>'+fmt(need)+'</b> · 거래일 '+escHtml(p.date)+'</div>'+
    '<div style="color:var(--muted);font-size:11px;margin-bottom:10px">LOT는 유통기한 임박순으로 자동 배정됩니다. 필요시 수량을 직접 조정하세요.</div>'+
    lotRows +
    '<div id="out_sum" style="margin-top:10px;font-size:13px"></div>'+
    '<div class="modal-foot"><button class="btn btn-ghost" id="out_cancel">취소</button><button class="btn" id="out_save">출고 확정</button></div></div>';
  document.body.appendChild(m);
  m.addEventListener('click',(e)=>{ if(e.target===m) m.remove(); });
  m.querySelector('#out_cancel').addEventListener('click',()=>m.remove());
  function sum(){ let s=0; m.querySelectorAll('[data-lot]').forEach(i=>s+=parseInt(i.value||'0',10)||0); return s; }
  function refreshSum(){ const s=sum(); m.querySelector('#out_sum').innerHTML='배정 합계: <b>'+fmt(s)+'</b> / 필요: '+fmt(need)+(s===need?' <span class="pill green">일치</span>':' <span class="pill amber">불일치</span>'); }
  m.querySelectorAll('[data-lot]').forEach(i=>i.addEventListener('input',refreshSum)); refreshSum();
  m.querySelector('#out_save').addEventListener('click',async()=>{
    const allocs=[]; let s=0;
    m.querySelectorAll('[data-lot]').forEach(i=>{ const t=parseInt(i.value||'0',10)||0; if(t>0){ allocs.push({lotId:i.getAttribute('data-lot'), take:t}); s+=t; } });
    if(s<=0){ toast('출고 수량을 배정하세요'); return; }
    if(s!==need && !confirm('배정 합계('+fmt(s)+')가 필요수량('+fmt(need)+')과 다릅니다. 그래도 진행할까요?')) return;
    for(const al of allocs){ const l=ledgerLots.find(x=>x._id===al.lotId); if(!l || al.take>Number(l.currentQty)){ toast('LOT 재고를 초과했습니다'); return; } }
    const btn=m.querySelector('#out_save'); btn.disabled=true; btn.textContent='처리 중...';
    try{
      for(const al of allocs){
        const l=ledgerLots.find(x=>x._id===al.lotId);
        const rec={ srcTradeId:p.srcTradeId, opProduct:p.opProduct, product:p.product, date:p.date, qty:al.take,
          lotId:l._id, lotNo:l.lotNo, prodDate:l.prodDate, expiry:l.expiry, dest:'KY 메디칼', tradeMemo:p.memo,
          sterile:!!l.sterile, model:l.model||'', maker:(prodMap[p.product]||{}).maker||'',
          customsNo:l.customsNo||'', importDeclNo:l.importDeclNo||'',
          inspectOutStatus:'pending', createdAt:Date.now(), createdBy:currentUser.name };
        await push(ref(db,'gmp_data/outbound'), rec);
        await update(ref(db,'gmp_data/lots/'+l._id), { currentQty: Number(l.currentQty)-al.take });

// KS Q ISO 2859-1 특별검사수준 S-2, AQL 1.0 (시료문자/샘플크기). Ac0/Re1.
function s2Plan(lotQty){
  const n=Number(lotQty)||0;
  let code;
  if(n<=15) code='A'; else if(n<=150) code='B'; else if(n<=1200) code='C'; else if(n<=35000) code='D'; else code='E';
  const size={A:2,B:3,C:5,D:8,E:13}[code];
  return { code, size, ac:0, re:1 };
}

function info(label,val){ return '<div><div style="color:var(--muted);font-size:11px">'+escHtml(label)+'</div><div style="font-weight:600">'+escHtml(val||'-')+'</div></div>'; }

// 서명 패드
function setupSignature(canvas){
  const ctx=canvas.getContext('2d');
  ctx.lineWidth=2.2; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#111';
  let drawing=false, has=false;
  function pos(e){ const r=canvas.getBoundingClientRect(); const t=(e.touches&&e.touches[0])?e.touches[0]:e; return { x:(t.clientX-r.left)*(canvas.width/r.width), y:(t.clientY-r.top)*(canvas.height/r.height) }; }
  function start(e){ e.preventDefault(); drawing=true; has=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); }
  function move(e){ if(!drawing) return; e.preventDefault(); const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); }
  function end(){ drawing=false; }
  canvas.addEventListener('mousedown',start); canvas.addEventListener('mousemove',move); window.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false}); canvas.addEventListener('touchmove',move,{passive:false}); canvas.addEventListener('touchend',end);
  return { clear(){ ctx.clearRect(0,0,canvas.width,canvas.height); has=false; }, isEmpty(){ return !has; }, dataUrl(){ return canvas.toDataURL('image/png'); } };
}

async function nextInsDocNo(prefix, dateStr){
  const ym=(dateStr||new Date().toISOString().slice(0,10)).slice(0,7).replace('-','');
  const a=(await get(ref(db,'gmp_data/inspectIn'))).val()||{};
  const b=(await get(ref(db,'gmp_data/inspectOut'))).val()||{};
  let max=0; const re=new RegExp('^'+prefix+'-'+ym+'-(\\d+)$');
  [a,b].forEach(obj=>Object.values(obj).forEach(v=>{ const mm=String(v.docNo||'').match(re); if(mm){ const n=parseInt(mm[1],10); if(n>max) max=n; } }));
  return prefix+'-'+ym+'-'+String(max+1).padStart(3,'0');
}

async function saveInspectIn(lot, prod, plan, sig){
  if(sig.isEmpty()){ toast('품질책임자 서명을 해주세요'); return; }
  const items = INSPECT_ITEMS_IN.map((it,idx)=>{ const v=document.querySelector('input[name=it'+idx+']:checked'); return { group:it.group, std:it.std, result:(v?v.value:'pass') }; });
  const overall = (document.querySelector('input[name=overall]:checked')||{}).value || 'pass';
  const method  = (document.querySelector('input[name=method]:checked')||{}).value || 'sampling';
  const inspectDate = $('ii_date').value || new Date().toISOString().slice(0,10);
  const inspector = ($('ii_inspector').value||currentUser.name).trim();
  const remark = ($('ii_remark').value||'').trim();
  const sbatch = lot.sterile ? (($('ii_sbatch')||{value:''}).value||'').trim() : '';
  let docNo;
  try{ docNo = await nextInsDocNo('AMT-OP-301', inspectDate); }catch(e){ toast('문서번호 생성 실패: '+e.message); return; }
  const rec = {
    docNo, lotId:lot._id, product:lot.product, model:lot.model||prod.model||'', maker:prod.maker||'',
    customsNo:lot.customsNo||'', importDeclNo:lot.importDeclNo||'', lotNo:lot.lotNo, sterilBatchNo:sbatch,
    qty:lot.initialQty, sterile:!!lot.sterile,
    method, sampleCode:plan.code, sampleSize:plan.size, ac:plan.ac, re:plan.re,
    items, overall, remark, inspectDate, inspector, signature:sig.dataUrl(),
    createdAt:Date.now(), createdBy:currentUser.name
  };
  try{
    const pushed = await push(ref(db,'gmp_data/inspectIn'), rec);
    await update(ref(db,'gmp_data/lots/'+lot._id), { inspectInStatus:'done', inspectInId:pushed.key, inspectInOverall:overall });
    logAudit('등록','입고검사성적서 '+docNo+' ('+lot.product+'/'+lot.lotNo+') '+(overall==='pass'?'합격':'불합격'));
    toast('입고검사성적서 저장 완료'); navTo('lot');
  }catch(e){ toast('저장 실패: '+e.message); }
}

async function saveInspectOut(ob, prod, plan, sig, customsNo, importDeclNo){
  if(sig.isEmpty()){ toast('품질책임자 서명을 해주세요'); return; }
  const items=INSPECT_ITEMS_OUT.map((it,idx)=>{ const v=document.querySelector('input[name=ot'+idx+']:checked'); return {group:it.group, std:it.std, result:(v?v.value:'pass')}; });
  const overall=(document.querySelector('input[name=ooverall]:checked')||{}).value||'pass';
  const method=(document.querySelector('input[name=omethod]:checked')||{}).value||'sampling';
  const inspectDate=$('oo_date').value||new Date().toISOString().slice(0,10);
  const inspector=($('oo_inspector').value||'강승섭').trim();
  const remark=($('oo_remark').value||'').trim();
  const sbatch=ob.sterile?(($('oo_sbatch')||{value:''}).value||'').trim():'';
  let docNo; try{ docNo=await nextInsDocNo('AMT-OP-301', inspectDate); }catch(e){ toast('문서번호 생성 실패: '+e.message); return; }
  const rec={ docNo, outboundId:ob._id, product:ob.product, model:ob.model||prod.model||'', maker:prod.maker||ob.maker||'',
    customsNo:customsNo||ob.customsNo||'', importDeclNo:importDeclNo||ob.importDeclNo||'',
    lotNo:ob.lotNo, sterilBatchNo:sbatch, dest:ob.dest||'KY 메디칼', outDate:ob.date,
    qty:ob.qty, sterile:!!ob.sterile, method, sampleCode:plan.code, sampleSize:plan.size, ac:plan.ac, re:plan.re,
    items, overall, remark, inspectDate, inspector, signature:sig.dataUrl(), createdAt:Date.now(), createdBy:currentUser.name };
  try{
    const pushed=await push(ref(db,'gmp_data/inspectOut'), rec);
    await update(ref(db,'gmp_data/outbound/'+ob._id), { inspectOutStatus:'done', inspectOutId:pushed.key, inspectOutOverall:overall });
    logAudit('등록','출고검사성적서 '+docNo+' ('+ob.product+'/'+ob.lotNo+') '+(overall==='pass'?'합격':'불합격'));
    toast('출고검사성적서 저장 완료'); navTo('ledger');
  }catch(e){ toast('저장 실패: '+e.message); }
}

  const cb=onValue(r,(snap)=>{
    const v=snap.val()||{};
    let rows=Object.keys(v).map(k=>v[k]).sort((a,b)=>Number(b.ts||0)-Number(a.ts||0)).slice(0,300);
    if(!rows.length){ $('auditTable').innerHTML='<div class="empty">기록이 없습니다.</div>'; return; }
    let html='<table><thead><tr><th>시각</th><th>사용자</th><th>작업</th><th>내용</th></tr></thead><tbody>';
    rows.forEach(x=>{ const d=new Date(Number(x.ts||0)); const ts=isNaN(d.getTime())?'':d.toLocaleString('ko-KR'); html+='<tr><td style="white-space:nowrap">'+escHtml(ts)+'</td><td>'+escHtml(x.user||'')+'</td><td><span class="pill">'+escHtml(x.action||'')+'</span></td><td>'+escHtml(x.detail||'')+'</td></tr>'; });
    html+='</tbody></table>';
    $('auditTable').innerHTML=html;
  },(err)=>{ $('auditTable').innerHTML='<div class="empty">'+escHtml(err.message)+'</div>'; });
  usersUnsub=()=>off(r,'value',cb);
}

/* ════════ 첨부파일관리 (Google Drive 업로드 via GAS) ════════ */
function fileToBase64(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(String(r.result).split(',')[1]||''); r.onerror=()=>rej(new Error('파일 읽기 실패')); r.readAsDataURL(file); }); }
async function gasUpload(cfg, payload){
  const res=await fetch(cfg.driveUploadUrl,{ method:'POST', body:JSON.stringify(Object.assign({token:cfg.uploadToken}, payload)) });
  const txt=await res.text(); let j;
  try{ j=JSON.parse(txt); }catch(e){ throw new Error('서버 응답 오류 (GAS 배포/접근권한 확인)'); }
  if(!j.ok) throw new Error(j.error||'요청 실패');
  return j;
}
async function renderFiles(){
  $('page').innerHTML='<div class="card"><div class="empty">불러오는 중...</div></div>';
  let cfg={}; try{ const raw=(await get(ref(db,'amt_config'))).val()||{}; const gu=raw.gmpUpload||{}; cfg={ driveUploadUrl: gu.url||raw.driveUploadUrl||'', uploadToken: gu.token||raw.uploadToken||'' }; }catch(_){ cfg={}; }
  let lots=[];
  try{ const lv=(await get(ref(db,'gmp_data/lots'))).val()||{}; lots=Object.keys(lv).map(k=>Object.assign({_id:k},lv[k])).sort((a,b)=>String(b.inDate||b.prodDate||'').localeCompare(String(a.inDate||a.prodDate||''))); }
  catch(e){ $('page').innerHTML='<div class="card"><div class="empty">'+escHtml(e.message)+'</div></div>'; return; }
  let opts='<option value="">— LOT 선택 —</option>';
  lots.forEach(l=>{ opts+='<option value="'+escHtml(l._id)+'">'+escHtml(l.product)+' / '+escHtml(l.lotNo)+'</option>'; });
  const cfgOk=!!(cfg.driveUploadUrl && cfg.uploadToken);
  const setupNote = (canWrite()&&!cfgOk) ? '<div class="banner warn">⚠️ 업로드 설정이 필요합니다. (Firebase <b>amt_config</b>에 driveUploadUrl·uploadToken 설정, GAS 스크립트 속성에 ROOT_FOLDER_ID·UPLOAD_TOKEN 설정) 보기·다운로드는 설정 없이도 됩니다.</div>' : '';
  $('page').innerHTML='<div class="card"><div class="card-h"><div class="t">첨부파일관리</div></div>'+
    '<div style="color:var(--muted);font-size:12px;margin-bottom:8px">표준통관예정보고서·수입신고필증 등 PDF를 LOT에 첨부합니다. 파일은 회사 Google Drive에 저장되고, 여기에는 보기 링크만 보관됩니다.</div>'+
    setupNote+
    '<div class="field" style="max-width:400px"><label>LOT 선택</label><select id="fl_lot">'+opts+'</select></div>'+
    '<div id="flBox"></div></div>';
  $('fl_lot').addEventListener('change',()=>filesForLot(cfg, lots.find(x=>x._id===$('fl_lot').value)));
}
function filesForLot(cfg, lot){
  const box=$('flBox'); if(!box) return;
  if(usersUnsub){ usersUnsub(); usersUnsub=null; }
  if(!lot){ box.innerHTML=''; return; }
  const cfgOk=!!(cfg.driveUploadUrl && cfg.uploadToken);
  let upHtml='';
  if(canWrite() && cfgOk){
    upHtml='<div class="card" style="background:#f8fafc;margin-top:12px"><b style="font-size:13px">새 첨부 업로드</b>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:end;margin-top:8px">'+
      '<div class="field" style="margin:0"><label>문서유형</label><select id="fl_type"><option>표준통관예정보고서</option><option>수입신고필증</option><option>시험성적서</option><option>기타</option></select></div>'+
      '<div class="field" style="margin:0"><label>PDF 파일</label><input id="fl_file" type="file" accept="application/pdf,image/*"></div>'+
      '<button class="btn" id="fl_up">업로드</button></div>'+
      '<div id="fl_status" style="font-size:12px;color:var(--muted);margin-top:6px"></div></div>';
  }
  box.innerHTML='<div id="flList" style="margin-top:12px"><div class="empty">불러오는 중...</div></div>'+upHtml;
  const r=ref(db,'gmp_data/attachments/'+lot._id);
  const cb=onValue(r,(snap)=>{
    const v=snap.val()||{};
    const rows=Object.keys(v).map(k=>Object.assign({_id:k},v[k])).sort((a,b)=>Number(b.uploadedAt||0)-Number(a.uploadedAt||0));
    if(!rows.length){ $('flList').innerHTML='<div class="empty">첨부된 파일이 없습니다.</div>'; return; }
    let html='<table><thead><tr><th>문서유형</th><th>파일명</th><th>업로드</th><th></th></tr></thead><tbody>';
    rows.forEach(x=>{ const dt=new Date(Number(x.uploadedAt||0)); const ds=isNaN(dt.getTime())?'':dt.toLocaleDateString('ko-KR');
      html+='<tr><td>'+escHtml(x.docType||'')+'</td><td>'+escHtml(x.name||'')+'</td><td>'+escHtml(x.by||'')+' · '+escHtml(ds)+'</td><td><div class="actions-cell"><a class="btn btn-ghost btn-sm" href="'+escHtml(x.viewUrl||'#')+'" target="_blank" rel="noopener">보기</a>'+((canWrite()&&cfgOk)?'<button class="btn btn-ghost btn-sm" data-del="'+escHtml(x._id)+'">삭제</button>':'')+'</div></td></tr>'; });
    html+='</tbody></table>';
    const w=$('flList'); w.innerHTML=html;
    w.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>delAttachment(cfg, lot, rows.find(z=>z._id===b.getAttribute('data-del')))));
  },(err)=>{ $('flList').innerHTML='<div class="empty">'+escHtml(err.message)+'</div>'; });
  usersUnsub=()=>off(r,'value',cb);
  if(canWrite() && cfgOk && $('fl_up')) $('fl_up').addEventListener('click',()=>doUpload(cfg, lot));
}
async function doUpload(cfg, lot){
  const fileEl=$('fl_file'); const st=$('fl_status');
  if(!fileEl||!fileEl.files||!fileEl.files[0]){ toast('파일을 선택하세요'); return; }
  const file=fileEl.files[0];
  if(file.size>40*1024*1024){ toast('40MB 이하만 업로드 가능합니다'); return; }
  const docType=($('fl_type')&&$('fl_type').value)||'기타';
  if(st) st.textContent='업로드 중...'; const btn=$('fl_up'); if(btn) btn.disabled=true;
  try{
    const base64Data=await fileToBase64(file);
    const j=await gasUpload(cfg,{ action:'upload', base64Data, filename:file.name, mimeType:file.type||'application/pdf', product:lot.product, lot:lot.lotNo, docType });
    await push(ref(db,'gmp_data/attachments/'+lot._id),{ fileId:j.fileId, name:j.name, viewUrl:j.viewUrl, downloadUrl:j.downloadUrl, docType, uploadedAt:Date.now(), by:currentUser.name });
    logAudit('첨부','파일 업로드: '+lot.product+'/'+lot.lotNo+' · '+docType+' · '+j.name);
    if(st) st.textContent='완료 ✅'; fileEl.value='';
  }catch(e){ if(st) st.textContent='실패: '+e.message; toast('업로드 실패: '+e.message); }
  finally{ if(btn) btn.disabled=false; }
}
async function delAttachment(cfg, lot, att){
  if(!att) return;
  if(!confirm('이 첨부를 삭제할까요? (Drive 휴지통으로 이동)\n'+att.name)) return;
  try{
    if(att.fileId){ try{ await gasUpload(cfg,{ action:'delete', fileId:att.fileId }); }catch(_){} }
    await set(ref(db,'gmp_data/attachments/'+lot._id+'/'+att._id), null);
    logAudit('첨부삭제','파일 삭제: '+lot.product+'/'+lot.lotNo+' · '+att.name);
    toast('삭제되었습니다');
  }catch(e){ toast('삭제 실패: '+e.message); }
}

/* ── 설정: 사용자관리 ── */
function renderSettings(){
  $('page').innerHTML='<div class="card"><div class="card-h"><div class="t">사용자 관리</div><button id="addUserBtn" class="btn btn-sm">+ 사용자 추가</button></div>'+
    '<div style="color:var(--muted);font-size:12px;margin-bottom:12px">관리자=등록·검사·서명 가능 / 조회자=읽기 전용. 이메일·코드로 로그인합니다.</div><div id="userTable"><div class="empty">불러오는 중...</div></div></div>';
  $('addUserBtn').addEventListener('click',()=>openUserModal());
  const r=ref(db,'gmp_admins');
  const cb=onValue(r,(snap)=>{
    const val=snap.val()||{};
    const rows=Object.keys(val).map(k=>Object.assign({_key:k},val[k]));
    rows.sort((a,b)=>String(a.name).localeCompare(String(b.name),'ko'));
    drawUserTable(rows);
  },(err)=>{ $('userTable').innerHTML='<div class="empty">'+escHtml(err.message)+'</div>'; });
  usersUnsub=()=>off(r,'value',cb);
}
function drawUserTable(rows){
  if(!rows.length){ $('userTable').innerHTML='<div class="empty">등록된 사용자가 없습니다.</div>'; return; }
  let html='<table><thead><tr><th>이름</th><th>이메일</th><th>권한</th><th></th></tr></thead><tbody>';
  rows.forEach(u=>{
    const roleLabel={super:'총괄관리자',admin:'관리자',viewer:'조회자'}[u.role]||u.role;
    const isSelf = currentUser && u.email===currentUser.email;
    html+='<tr><td><b>'+escHtml(u.name)+'</b></td><td>'+escHtml(u.email)+'</td><td><span class="pill '+(u.role==='viewer'?'green':'amber')+'">'+escHtml(roleLabel)+'</span></td>'+
      '<td><div class="actions-cell">'+(u.role==='super'||isSelf ? '<span style="color:var(--muted);font-size:12px">—</span>' : '<button class="btn btn-ghost btn-sm" data-uedit="'+escHtml(u._key)+'">수정</button><button class="btn btn-danger btn-sm" data-udel="'+escHtml(u._key)+'">삭제</button>')+'</div></td></tr>';
  });
  html+='</tbody></table>';
  const wrap=$('userTable'); wrap.innerHTML=html;
  wrap.querySelectorAll('[data-uedit]').forEach(b=>b.addEventListener('click',()=>openUserModal(rows.find(x=>x._key===b.getAttribute('data-uedit')))));
  wrap.querySelectorAll('[data-udel]').forEach(b=>b.addEventListener('click',()=>delUser(rows.find(x=>x._key===b.getAttribute('data-udel')))));
}
function openUserModal(row){
  const isEdit=!!row;
  const m=document.createElement('div'); m.className='modal-bg';
  m.innerHTML='<div class="modal"><h3>'+(isEdit?'사용자 수정':'사용자 추가')+'</h3>'+
    '<div class="field"><label>이름</label><input id="u_name" value="'+escHtml(isEdit?row.name:'')+'"></div>'+
    '<div class="field"><label>이메일</label><input id="u_email" type="email" value="'+escHtml(isEdit?row.email:'')+'" '+(isEdit?'disabled class="ro"':'')+'></div>'+
    '<div class="row2"><div class="field"><label>코드(비밀번호)</label><input id="u_code" value="'+escHtml(isEdit?row.code:'')+'"></div><div class="field"><label>권한</label><select id="u_role"><option value="admin"'+(isEdit&&row.role==='admin'?' selected':'')+'>관리자</option><option value="viewer"'+(isEdit&&row.role==='viewer'?' selected':'')+'>조회자</option></select></div></div>'+
    '<div class="modal-foot"><button class="btn btn-ghost" id="u_cancel">취소</button><button class="btn" id="u_save">저장</button></div></div>';
  document.body.appendChild(m);
  m.addEventListener('click',(e)=>{ if(e.target===m) m.remove(); });
  m.querySelector('#u_cancel').addEventListener('click',()=>m.remove());
  m.querySelector('#u_save').addEventListener('click',async()=>{
    const name=(m.querySelector('#u_name').value||'').trim();
    const email=(m.querySelector('#u_email').value||'').trim().toLowerCase();
    const code=(m.querySelector('#u_code').value||'').trim();
    const role=m.querySelector('#u_role').value;
    if(!name||!email||!code){ toast('이름·이메일·코드를 모두 입력하세요'); return; }
    const key=emailKey(email);
    try{
      await set(ref(db,'gmp_admins/'+key), {email, name, code, role, updatedAt:Date.now()});
      if(role==='admin'){ await set(ref(db,'admin_emails/'+key),true); await set(ref(db,'viewer_emails/'+key),null); }
      else{ await set(ref(db,'viewer_emails/'+key),true); await set(ref(db,'admin_emails/'+key),null); }
      logAudit(isEdit?'수정':'등록','사용자 '+(isEdit?'수정':'등록')+': '+name+' ('+role+')');
      toast('저장되었습니다'); m.remove();
    }catch(e){ toast('저장 실패: '+e.message); }
  });
}
async function delUser(row){
  if(!row) return;
  if(!confirm('“'+row.name+'” 사용자를 삭제할까요? (로그인 불가가 됩니다)')) return;
  const key=row._key;
  try{
    await set(ref(db,'gmp_admins/'+key), null); await set(ref(db,'admin_emails/'+key), null); await set(ref(db,'viewer_emails/'+key), null);
    logAudit('삭제','사용자 삭제: '+row.name); toast('삭제되었습니다');
  }catch(e){ toast('삭제 실패: '+e.message); }
}

/* ── 이벤트 바인딩 ── */
$('loginBtn').addEventListener('click', doLogin);
$('loginCode').addEventListener('keydown',(e)=>{ if(e.key==='Enter') doLogin(); });
$('loginEmail').addEventListener('keydown',(e)=>{ if(e.key==='Enter') $('loginCode').focus(); });
$('logoutBtn').addEventListener('click', doLogout);
$('menuToggle').addEventListener('click',()=>$('side').classList.toggle('open'));

/* ── 세션 복원 ── */
onAuthStateChanged(auth, async (user)=>{
  if(loggingIn) return;
  if(user && !currentUser){
    try{
      const rec=(await get(ref(db,'gmp_admins/'+emailKey(user.email)))).val();
      if(rec){ currentUser={email:user.email.toLowerCase(), name:rec.name, role:rec.role||'viewer'}; renderMain(); }
      else { await signOut(auth); showLogin(); }
    }catch(e){ showLogin(); }
  }else if(!user){ currentUser=null; showLogin(); }
});
</script>
